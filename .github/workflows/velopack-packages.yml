name: VeloPack Packages

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: App version to pack.
        required: true
        default: 0.2.7
      channel:
        description: VeloPack channel prefix.
        required: true
        default: stable
      publish_release:
        description: Create or update a GitHub Release from the VeloPack artifacts.
        required: true
        type: boolean
        default: true
      prerelease:
        description: Mark the GitHub Release as a pre-release.
        required: true
        type: boolean
        default: false
      draft:
        description: Create or update the GitHub Release as a draft.
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  APP_PROJECT: src/LevelUp.NavTableUpdater.App/LevelUp.NavTableUpdater.App.csproj
  APP_ID: XPlane737NGMaintenanceToolkit
  APP_TITLE: X-Plane 737NG Maintenance Toolkit
  APP_AUTHORS: X-Plane 737NG Maintenance Toolkit contributors

jobs:
  package:
    name: Package (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            main_exe: XPlane737NGMaintenanceToolkit.exe
            pack_icon_args: --icon "src/LevelUp.NavTableUpdater.App/Assets/avalonia-logo.ico"
          - os: macos-latest
            rid: osx-arm64
            main_exe: XPlane737NGMaintenanceToolkit
            pack_icon_args: ""
          - os: ubuntu-latest
            rid: linux-x64
            main_exe: XPlane737NGMaintenanceToolkit
            pack_icon_args: --icon "src/LevelUp.NavTableUpdater.App/Assets/app-icon.png"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools

      - name: Restore
        run: dotnet restore LevelUp.NavTableUpdater.slnx

      - name: Build
        run: dotnet build LevelUp.NavTableUpdater.slnx --configuration Release --no-restore -p:Version=${{ inputs.app_version }}

      - name: Test
        run: dotnet test tests/LevelUp.NavTableUpdater.Core.Tests/LevelUp.NavTableUpdater.Core.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish self-contained app
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:Version=${{ inputs.app_version }}
          --output artifacts/publish/${{ matrix.rid }}

      - name: Restore VeloPack CLI
        run: dotnet tool restore

      - name: Pack VeloPack package
        run: >
          dotnet tool run vpk -- pack
          --packId "${{ env.APP_ID }}"
          --packVersion "${{ inputs.app_version }}"
          --packDir "artifacts/publish/${{ matrix.rid }}"
          --mainExe "${{ matrix.main_exe }}"
          --packTitle "${{ env.APP_TITLE }}"
          --packAuthors "${{ env.APP_AUTHORS }}"
          --runtime "${{ matrix.rid }}"
          --channel "${{ inputs.channel }}-${{ matrix.rid }}"
          ${{ matrix.pack_icon_args }}
          --outputDir "artifacts/velopack/${{ matrix.rid }}"

      - name: Upload publish output
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.rid }}
          path: artifacts/publish/${{ matrix.rid }}
          if-no-files-found: error

      - name: Upload VeloPack output
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.rid }}
          path: artifacts/velopack/${{ matrix.rid }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: ${{ inputs.publish_release }}
    permissions:
      contents: write

    steps:
      - name: Download VeloPack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: velopack-*
          path: artifacts/release
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="${{ inputs.app_version }}"
          TAG="v${APP_VERSION}"

          find artifacts/release -maxdepth 1 -type f | sort

          printf '%s\n' \
            "Automated VeloPack release from commit ${GITHUB_SHA}." \
            "" \
            "Included assets:" \
            "" \
            "- Windows x64 setup and portable package" \
            "- macOS arm64 pkg and portable package" \
            "- Linux x64 AppImage" \
            "- VeloPack full packages and stable channel metadata" \
            "- SHA-256 checksums" \
            "" \
            "Important limitations:" \
            "" \
            "- unsigned Windows build" \
            "- unsigned and not notarized macOS build" \
            "- public toolkit release, not an official LevelUp production release" \
            > "artifacts/release/release-notes-${TAG}.md"

          (
            cd artifacts/release
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
              | sort -z \
              | xargs -0 shasum -a 256 > SHA256SUMS.txt
          )

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          APP_VERSION="${{ inputs.app_version }}"
          TAG="v${APP_VERSION}"
          TITLE="X-Plane 737NG Maintenance Toolkit ${APP_VERSION}"
          NOTES_FILE="artifacts/release/release-notes-${TAG}.md"
          release_flags=()

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi

          if [[ "${{ inputs.draft }}" == "true" ]]; then
            release_flags+=(--draft)
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${TITLE}" \
              --notes-file "${NOTES_FILE}" \
              "${release_flags[@]}"
          else
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${TITLE}" \
              --notes-file "${NOTES_FILE}" \
              "${release_flags[@]}"
          fi

          gh release upload "${TAG}" artifacts/release/* --clobber
